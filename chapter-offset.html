<script>
document.addEventListener('DOMContentLoaded', function () {
  // Hide pre-chapter pages from sidebar (Preface and Foreword are not numbered chapters)
  ['index.html', './index.html', 'foreword.html', './foreword.html'].forEach(function (href) {
    document.querySelectorAll('.sidebar-item a[href$="' + href + '"]').forEach(function (a) {
      var item = a.closest('.sidebar-item');
      if (item) item.style.display = 'none';
    });
  });

  // Quarto counts index.qmd as Ch 1 and foreword.qmd as Ch 2 regardless of {.unnumbered}.
  // 01-introduction.qmd therefore renders as Ch 3. Decrement by 2 so Introduction = Ch 1.
  document.querySelectorAll('.chapter-number').forEach(function (span) {
    var n = parseInt(span.textContent, 10);
    if (!isNaN(n) && n >= 1) span.textContent = String(n - 2);
  });

  document.querySelectorAll('.header-section-number').forEach(function (span) {
    var parts = span.textContent.trim().split('.');
    var ch = parseInt(parts[0], 10);
    if (!isNaN(ch) && ch >= 1) {
      parts[0] = String(ch - 2);
      span.textContent = parts.join('.');
    }
  });
});
</script>
