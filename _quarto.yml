project:
  type: book
  output-dir: docs

book:
  title: "BLISS-2026"
  subtitle: "Decomposition-Based Multidisciplinary Design Optimization — A Modern Julia Treatment"
  author: "Troy David Altus"
  date: "May 2026"
  repo-url: https://github.com/altustd/bliss2026
  repo-actions: [edit, issue]
  navbar:
    left:
      - text: "← troyaltus.com"
        href: "https://troyaltus.com"
  chapters:
    - index.qmd
    - foreword.qmd
    - 01-introduction.qmd
    - 02-bliss98.qmd
    - 03-bliss-rs-formulation.qmd
    - 04-response-surface-methodology.qmd
    - 05-design-of-experiments.qmd
    - 06-interval-reduction.qmd
    - 07-supersonic-business-jet.qmd
    - 08-black-box-fidelity.qmd
    - 09-bliss2026-framework.qmd
    - 11-modern-mdo-landscape.qmd
    - references.qmd
  appendices:
    - appendix-a-hypersphere.qmd
    - appendix-b-julia-reference.qmd

format:
  html:
    theme: cosmo
    include-in-header: chapter-offset.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-line-numbers: true
    fig-align: center
    fig-responsive: true
    self-contained: false
    smooth-scroll: true
    highlight-style: github
  pdf:
    documentclass: scrbook
    classoption: [12pt, letterpaper, oneside]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
    number-sections: true
    colorlinks: true
    linkcolor: NavyBlue
    citecolor: NavyBlue
    toc: true
    toc-depth: 2
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[L]{\small BLISS-2026 — Altus}
        \fancyhead[R]{\small\thepage}
        \renewcommand{\headrulewidth}{0.4pt}
        \usepackage{setspace}
        \setstretch{1.15}

bibliography: references.bib
csl: aiaa.csl

execute:
  engine: julia
  warning: false
  message: false
  cache: true

julia:
  exeflags: ["--project=@."]
