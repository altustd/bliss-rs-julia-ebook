project:
  type: book
  output-dir: docs

book:
  title: "BLISS-2026"
  subtitle: "Decomposition-Based Multidisciplinary Design Optimization — A Modern Julia Treatment"
  author: "Troy David Altus"
  date: today
  repo-url: https://github.com/altustd/bliss2026
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - 01-introduction.qmd
    - 02-bliss98.qmd
    - 03-bliss-rs-formulation.qmd
    - 04-response-surface-methodology.qmd
    - 05-design-of-experiments.qmd
    - 06-interval-reduction.qmd
    - 07-supersonic-business-jet.qmd
    - 08-black-box-fidelity.qmd
    - 09-bliss2026-framework.qmd
    - 10-srm-application.qmd
    - 11-modern-mdo-landscape.qmd
    - references.qmd
  appendices:
    - appendix-a-hypersphere.qmd
    - appendix-b-julia-reference.qmd

format:
  html:
    theme: cosmo
    include-in-header: chapter-offset.html
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-line-numbers: true
    fig-align: center
    fig-responsive: true
    self-contained: false
    smooth-scroll: true
    highlight-style: github
  # pdf:  # Re-enable after: brew install librsvg
  #   documentclass: scrbook
  #   toc: true
  #   number-sections: true
  #   colorlinks: true
  #   geometry: margin=1in

bibliography: references.bib
csl: aiaa.csl

execute:
  engine: julia
  warning: false
  message: false
  cache: true

julia:
  exeflags: ["--project=@."]
