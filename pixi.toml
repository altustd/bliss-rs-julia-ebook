[workspace]
name = "bliss2026"
version = "2.0.0"
description = "BLISS-2026: Decomposition-Based MDO with GP surrogates and Bayesian optimization in Julia"
authors = ["Troy Altus <altustd@gmail.com>"]
channels = ["conda-forge"]
# Julia is not packaged for osx-arm64/win-64 on conda-forge.
# Install Julia separately: brew install julia  (macOS)
#                            winget install julia  (Windows)
platforms = ["osx-arm64", "win-64"]

[dependencies]
quarto = ">=1.9"

[tasks]
setup      = "julia --project=. -e 'using Pkg; Pkg.add([\"Plots\",\"DataFrames\",\"Distributions\",\"LaTeXStrings\",\"Optim\",\"PrettyTables\",\"PlotlyJS\"]); Pkg.precompile(); println(\"Setup complete.\")'"
render     = "quarto render"
render-pdf = "quarto render --to pdf"
preview    = "quarto preview"
clean      = { cmd = "rm -rf docs/_freeze", description = "Clear Quarto cache" }
