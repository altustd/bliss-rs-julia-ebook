[project]
name = "bliss-rs-julia-ebook"
version = "0.1.0"
description = "BLISS Response Surface Methodology ebook using Julia and Quarto"
authors = ["Troy Altus <altustd@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
julia = ">=1.10,<2"
quarto = ">=1.9"

[tasks]
setup   = "julia --project=. -e 'using Pkg; Pkg.instantiate(); println(\"Setup complete.\")'"
render  = "quarto render"
render-pdf = "quarto render --to pdf"
preview = "quarto preview"
clean   = { cmd = "rm -rf docs/_freeze", description = "Clear Quarto cache" }
